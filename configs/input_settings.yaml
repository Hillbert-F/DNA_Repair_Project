# Minimal config-driven IDEA pipeline example.
# run_id is optional; if omitted, IDEA creates one from this file name + timestamp.
# run_id: max_example_batch

# Optional preprocessing head step. If enabled, IDEA prepares raw PDBs from
# data/raw_dir into training/PDBs/{id}_modified.pdb and testing/PDBs/{id}_modified.pdb
# before run/train/test validation.
# data:
#   raw_dir: data
#   targets: [training, testing]
#   dna_mode: auto  # auto, ss, or ds for raw PDB preprocessing
#   ids: [ThermusDarTAF]
#   overwrite: true

defaults:
  protein_chain: A
  contact_cutoff_nm: 1.2
  gamma_cutoff_mode: 60
  phi:
    name: phi_pairwise_contact_well
    params: [-8.0, 8.0, 0.7, 10]
  training_decoys:
    dna: 1000
    protein: 10000
  max_testing_decoys: 1000000

# For built-in data, path can be omitted and is inferred as:
# training/PDBs/{id}_modified.pdb
training:
  pdbs:
    - 8K8D

# For built-in data, path can be omitted and is inferred as:
# testing/PDBs/{id}_modified.pdb
# sequences can be omitted and defaults to testing/sequences/dna_half.seq
testing:
  - id: 8K8D
    dna_mode: ds
